name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install @kilnai/core from npm (replace file reference)
        run: |
          jq '.devDependencies["@kilnai/core"] = "latest"' package.json > tmp.json && mv tmp.json package.json

      - run: bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Configure npm auth
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
          cp .npmrc packages/shared/.npmrc
          cp .npmrc packages/google-calendar/.npmrc
          cp .npmrc packages/stripe/.npmrc
          cp .npmrc packages/google-sheets/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Resolve workspace references
        run: |
          VERSION=$(jq -r .version packages/shared/package.json)
          for pkg in packages/google-calendar packages/stripe packages/google-sheets; do
            jq --arg v "^$VERSION" '
              (.dependencies // {}) |= with_entries(if .value == "workspace:*" then .value = $v else . end)
            ' "$pkg/package.json" > tmp.json && mv tmp.json "$pkg/package.json"
          done

      - name: Publish @kilnai/integration-shared
        working-directory: packages/shared
        run: bun publish --access public --no-git-checks

      - name: Publish @kilnai/integration-google-calendar
        working-directory: packages/google-calendar
        run: bun publish --access public --no-git-checks

      - name: Publish @kilnai/integration-stripe
        working-directory: packages/stripe
        run: bun publish --access public --no-git-checks

      - name: Publish @kilnai/integration-google-sheets
        working-directory: packages/google-sheets
        run: bun publish --access public --no-git-checks
