name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install @kilnai/core from npm (replace file reference)
        run: |
          jq '.devDependencies["@kilnai/core"] = "latest"' package.json > tmp.json && mv tmp.json package.json

      - run: bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test
